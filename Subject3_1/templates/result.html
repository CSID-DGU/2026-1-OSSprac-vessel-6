<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Page</title>
    <style>
        table {
            border-collapse: seperate;
            border-spacing: 2px;
            border: 1px solid black;
            margin: 10px;
        }

        th, td {
            border: 1px solid black;
            padding: 4px 8px;
            font-size: 24px;
        }

        th {
            font-weight: bold;
            text-align: center;
        }

        td {
            text-align: left;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <td>{{ result['Name'] }}</td>
        </tr>
        <tr>
            <th>StudentNumber</th>
            <td>{{ result['StudentNumber'] }}</td>
        </tr>
        <tr>
            <th>Gender</th>
            <td>{{ result['Gender'] }}</td>
        </tr>
        <tr>
            <th>Major</th>
            <td>{{ result['Major'] }}</td>
        </tr>
        <tr>
            <th>languages</th>
            <td>
                {% if result['languages'] is string %}
                    {{ result['languages'] }}
                {% else %}
                    {{ result['languages'] | join(', ') }}
                {% endif %}
            </td>
        </tr>
    </table>
</body>
</html>
