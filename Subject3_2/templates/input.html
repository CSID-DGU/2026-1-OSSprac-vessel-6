<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 정보 입력</title>
    <link rel="stylesheet" href="../static/css/style.css"> <!--CSS link를 통해 불러오기-->
</head>
<body>
    <h1>팀원 정보 입력</h1>
    <!-- 입력양식, 입력받은 것을 /result로 POST방식으로 전송 -->
    <form action="/result" method="POST" id="studentForm">
        <!-- 팀원 블록이 추가되는 컨테이너 -->
        <div id="personContainer">
            <!-- 기본 첫 번째 팀원 블록 -->
            <div class="person-block">
                <p>이름: <input type="text" name="name[]" required></p>
                <p>학과: <input type="text" name="Department[]" required></p>
                <p>학번: <input type="text" name="StudentNumber[]" required></p>
                <p>전화번호: <input type="text" name="phone[]" placeholder="010-1234-5678"></p>
                <!-- 여기까지는 text 타입으로 받았고 required를 통해 필수 정보와 placeholder로 입력 예시를 보임 -->
                <p>이메일:</p>
                <!-- email container 따로 구현 -->
                <div class="email-container">
                    <input type="text" name="mail_id[]" placeholder="아이디" class="email-id" required>
                    <span class="at-sign">@</span> <!-- @ 기호만 따로 빼서 스타일 적용 -->
                    <input type="text" name="mail_domain[]" placeholder="도메인" class="domain-input" readonly required>
                    <!-- 이메일 뒷 부분 입력 창, readonly로 읽기전용으로 지정해놓아 입력은 불가능 -->
                    <select class="domain-select" onchange="updateEmailDomain(this)">
                        <option value="" disabled selected>선택하세요</option>
                        <option value="gmail.com">gmail.com</option>
                        <option value="naver.com">naver.com</option>
                        <option value="outlook.com">outlook.com</option>
                        <option value="custom">직접 입력</option>
                    </select>
                </div>

                <!-- 기술 스택 선택 창 -->
                <div class="tech-section">
                    <p style="font-weight:bold; margin-bottom: 10px;">🛠 기술 스택 (클릭하여 선택)</p>
                    <div class="tech-grid">
                        <!-- label을 사용해 input과 span을 묶어준다. 따라서 그냥 블록을 선택한 것이 체크박스도 같이 선택 -->
                        <label class="tech-chip">
                            <input type="checkbox" name="tech_stack[0][]" value="C++" style="display:none;">
                            <!-- 체크박스로 여러 개 선택하고 name을 배열로 주어 배열 형태로 result로 넘길 수 있다. display는 none으로 안 보이게 만든다-->
                            <span class="tech-label" style="--tech-color: #00599C">C++</span>
                        </label>
                        <label class="tech-chip">
                            <input type="checkbox" name="tech_stack[0][]" value="Python" style="display:none;">
                            <span class="tech-label" style="--tech-color: #3776AB">Python</span>
                        </label>
                        <label class="tech-chip">
                            <input type="checkbox" name="tech_stack[0][]" value="Linux" style="display:none;">
                            <span class="tech-label" style="--tech-color: #FCC624">Linux</span>
                        </label>
                        <label class="tech-chip">
                            <input type="checkbox" name="tech_stack[0][]" value="Git" style="display:none;">
                            <span class="tech-label" style="--tech-color: #F05032">Git</span>
                        </label>
                        <label class="tech-chip">
                            <input type="checkbox" name="tech_stack[0][]" value="Security" style="display:none;">
                            <span class="tech-label" style="--tech-color: #FF0000">Security</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- 하단 버튼 영역 -->
        <div style="text-align: center; margin-top: 30px;">
            <button type="button" onclick="addPerson()" class="btn-add">팀원 추가</button>
            <button type="submit" class="btn-submit">정보 제출</button>
        </div>
    </form>

    <!-- JS 연결 -->
    <script src="../static/js/theme.js"></script>
</body>
</html>
