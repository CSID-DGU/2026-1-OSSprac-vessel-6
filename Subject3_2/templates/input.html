<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 정보 입력</title>
    <link rel = "stylesheet" href = "../static/css/style.css">
</head>
<body>
    <h1>팀원 정보 입력</h1>
    <form action="/result" method="POST" id="studentForm">
        <div id="personContainer">
            <div class="person-block">
                <p>이름: <input type="text" name="name[]" required></p>
                <p>학과: <input type = "text" name = "Department[]" required></p>
                <p>학번: <input type="text" name="StudentNumber[]" required></p>
                <p>전화번호: 
                    <input type="text" name="phone[]" class="phone-input" placeholder="010-1234-5678" maxlength="13">
                    <small class="text-muted masking-notice"></small>
                </p>
                <p>이메일: 
                    <input type="text" name="mail[]" class="mail-input" placeholder="abc@gmail.com">
                    <small class="text-muted masking-notice"></small>
                </p>
            </div>
        </div>
        <button type="button" onclick="addPerson()">추가</button>
        <button type="submit">제출</button>
    </form>
    <script src = "../static/js/theme.js"></script>
</body>
</html>
