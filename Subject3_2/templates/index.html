<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS Team 6: Vessel</title>
    <!-- 외부 라이브러리 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #5b7cff;
            --bg-color: #ffffff;
            --text-color: #222222;
            --secondary-bg: #f6f8fc;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 내비게이션 바 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            top: 0; width: 84%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
        }

        .logo { 
            font-weight: bold; 
            font-size: 20px; 
            color: #333; /* 기본 색상 */
            transition: color 0.3s; 
        }
        body.dark-mode .logo {
            color: #ffffff !important;
        }
        .nav-menu { display: flex; align-items: center; gap: 30px; }
        .nav-menu a { 
            text-decoration: none; color: #333; font-weight: 600; 
            display: flex; align-items: center; gap: 8px; font-size: 17px;
        }

        .dark-btn {
            background: var(--secondary-bg); border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }

        /* 히어로 섹션 */
        .hero-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 150px 10% 80px;
            min-height: 80vh;
            gap: 50px;
        }

        .hero-content { flex: 1; }
        
        .badge {
            display: inline-block;
            padding: 10px 20px;
            background-color: #eff3ff;
            color: #5b7cff;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .hero-content h1 {
            font-size: 48px;
            line-height: 1.3;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .hero-content h1 span { color: var(--primary-color); }

        .description {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .hero-btns { display: flex; gap: 15px; }
        
        .btn {
            padding: 18px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .primary { background-color: var(--primary-color); color: white; box-shadow: 0 10px 20px rgba(91, 124, 255, 0.3); }
        .secondary { background-color: var(--secondary-bg); color: #4f66d8; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* 이미지 영역 */
        .hero-visual { flex: 1; display: flex; justify-content: flex-end; }
        
        .image-container {
            position: relative;
            width: 100%;
            max-width: 550px;
        }

        .main-collab-img {
            width: 100%;
            border-radius: 40px; /* 이미지 모서리 둥글게 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        /* 다크모드 대응 */
        body.dark-mode {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --secondary-bg: #333;
        }
        body.dark-mode .navbar { background: rgba(26, 26, 26, 0.9); }
        body.dark-mode .nav-menu a { color: white; }

        @media (max-width: 992px) {
            .hero-section { flex-direction: column; text-align: center; }
            .hero-visual { justify-content: center; }
            .hero-btns { justify-content: center; }
        }
    </style>
</head>

<body>
    <header class="navbar" data-aos="fade-down">
        <div class="logo">OSS Team 6: Vessel</div>
        <nav class="nav-menu">
            <a href="/"><i class="fa-solid fa-house"></i> 홈</a>
            <a href="/input"><i class="fa-solid fa-diagram-project"></i> 입력</a>
            <a href="/contact"><i class="fa-solid fa-users"></i> 팀원</a>
            <button id="dark-mode-toggle" class="dark-btn">
                <i class="fa-solid fa-moon"></i> <span>Dark</span>
            </button>
        </nav>
    </header>

    <main class="hero-section">
        <div class="hero-content" data-aos="fade-right" data-aos-duration="1000">
            <div class="badge">COLLABORATION & INNOVATION</div>
            <h1>오픈소스의 가치를 더하는<br><span>우리들의 협업 공간</span></h1>
            <p class="description">
                창의적인 아이디어와 기술력을 결합하여 혁신적인 웹 솔루션을 구축합니다.<br>
                우리 팀의 여정과 성과를 지금 바로 확인해보세요.
            </p>
            <div class="hero-btns">
                <a href="/input" class="btn primary">팀원 정보 입력하기</a>
                <a href="/contact" class="btn secondary">연락정보 보기</a>
            </div>
        </div>

        <div class="hero-visual" data-aos="fade-left" data-aos-duration="1000">
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=80" alt="Team Collaboration" class="main-collab-img">
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const toggleBtn = document.getElementById('dark-mode-toggle');
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            toggleBtn.querySelector('span').textContent = isDark ? 'Light' : 'Dark';
            toggleBtn.querySelector('i').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            logoText.style.color = isDark ? '#ffffff' : '#333333';
        });
    </script>
</body>
</html>
