<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀원 정보 결과</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .result-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .member-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 8px solid var(--primary-color);
            transition: transform 0.2s;
        }

        .member-card:hover {
            transform: translateY(-5px);
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .member-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .member-info p {
            margin: 8px 0;
            color: #555;
            font-size: 1rem;
        }

        .info-label {
            font-weight: 600;
            color: #888;
            width: 80px;
            display: inline-block;
        }

        .tech-tags {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-badge {
            background: #eef2f7;
            color: #4a90e2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #d1d9e6;
        }

        .btn-back {
            margin-top: 40px;
            padding: 12px 30px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>📋 등록된 팀원 리스트</h1>

    <div class="result-container">
        <!-- Flask에서 넘겨준 members 리스트를 반복문으로 출력 -->
        {% for member in members %}
        <div class="member-card">
            <div class="member-header">
                <span class="member-name">{{ member.name }}</span>
                <span style="color: #999;">{{ member.sn }}</span>
            </div>
            
            <div class="member-info">
                <p><span class="info-label">소속</span> {{ member.dept }}</p>
                <p><span class="info-label">연락처</span> {{ member.phone }}</p>
                <p><span class="info-label">이메일</span> {{ member.email }}</p>
            </div>

            <div class="tech-tags">
                <!-- 선택된 기술 스택이 있다면 출력 -->
                {% if member.techs %}
                    {% for tech in member.techs %}
                    <span class="tech-badge"># {{ tech }}</span>
                    {% endfor %}
                {% else %}
                    <span style="color: #ccc; font-size: 0.9rem;">선택된 기술 스택 없음</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>

    <a href="/" class="btn-back">다시 입력하기</a>

</body>
</html>
